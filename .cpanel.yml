---
deployment:
  tasks:

    # ── 1. Copiar Laravel para ~/laravel/ ─────────────────────
    - mkdir -p $HOME/laravel
    - rsync -a --exclude='.git' --exclude='.env' $SRCDIR/ $HOME/laravel/

    # ── 2. Garantir estrutura de storage ─────────────────────
    - mkdir -p $HOME/laravel/storage/framework/cache/data
    - mkdir -p $HOME/laravel/storage/framework/sessions
    - mkdir -p $HOME/laravel/storage/framework/views
    - mkdir -p $HOME/laravel/storage/logs
    - mkdir -p $HOME/laravel/bootstrap/cache
    - chmod -R 755 $HOME/laravel/storage $HOME/laravel/bootstrap/cache
