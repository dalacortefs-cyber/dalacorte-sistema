---
deployment:
  tasks:

    # ── 1. Garantir pasta public_html ────────────────────────
    - mkdir -p $HOME/public_html

    # ── 2. Frontend estático → public_html/ ──────────────────
    # (inclui .htaccess, api/index.php e api/.htaccess do public/)
    - rsync -a --delete ./frontend/out/ $HOME/public_html/

    # ── 3. Permissões ────────────────────────────────────────
    - chmod 644 $HOME/public_html/.htaccess
    - chmod 644 $HOME/public_html/api/index.php
    - chmod 644 $HOME/public_html/api/.htaccess
