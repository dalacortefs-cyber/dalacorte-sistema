name: Deploy → HostGator (dalacortefs.com.br)

on:
  push:
    branches:
      - main

jobs:

  # ────────────────────────────────────────────────────────
  # JOB 1 — Build do Next.js e deploy do frontend via FTP
  # ────────────────────────────────────────────────────────
  deploy-frontend:
    name: Build e Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Build estático (next export)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build
        # Gera frontend/out/ — pasta com todo o site estático

      - name: Deploy via FTP para public_html/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:    ${{ secrets.FTP_HOST }}
          username:  ${{ secrets.FTP_USERNAME }}
          password:  ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend/out/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**

  # ────────────────────────────────────────────────────────
  # JOB 2 — Composer install e commit do vendor/ no repo
  # (cPanel não tem composer — fazemos aqui e commitamos)
  # ────────────────────────────────────────────────────────
  build-backend:
    name: Composer Install → commit vendor/
    runs-on: ubuntu-latest
    # Não rodar se o commit já veio do Actions (evita loop)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo, pdo_mysql, tokenizer, xml, ctype, json

      - name: Composer install (sem dev, otimizado)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Commitar vendor/ se houver mudanças
        run: |
          git config user.name "GitHub Actions [Bot]"
          git config user.email "actions@github.com"
          git add vendor/
          if git diff --staged --quiet; then
            echo "vendor/ sem alterações — pulando commit"
          else
            git commit -m "chore: atualizar vendor/ via Actions [skip ci]"
            git push
          fi
