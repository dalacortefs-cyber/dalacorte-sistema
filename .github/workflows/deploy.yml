name: Build Backend (vendor/)

on:
  push:
    branches: [main]

jobs:
  build-backend:
    name: Composer Install → commit vendor/
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo, pdo_mysql, tokenizer, xml, ctype, json

      - name: Criar .env mínimo para o artisan não falhar
        run: cp .env.example .env 2>/dev/null || echo "APP_KEY=" > .env

      - name: Composer install
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-scripts

      - name: Commitar vendor/ se houver mudanças
        run: |
          git config user.name "GitHub Actions [Bot]"
          git config user.email "actions@github.com"
          git add vendor/
          if git diff --staged --quiet; then
            echo "vendor/ sem alterações"
          else
            git commit -m "chore: vendor/ atualizado via Actions [skip ci]"
            git push
          fi
