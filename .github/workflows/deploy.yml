name: Deploy → HostGator (dalacortefs.com.br)

on:
  push:
    branches:
      - main

jobs:

  # ────────────────────────────────────────────────────────
  # JOB 1 — Build do Next.js e deploy do frontend via FTP
  # ────────────────────────────────────────────────────────
  deploy-frontend:
    name: Build e Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Build estático (next export)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build
        # Gera frontend/out/ — pasta com todo o site estático

      - name: Deploy via FTP para public_html/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:    ${{ secrets.FTP_HOST }}
          username:  ${{ secrets.FTP_USERNAME }}
          password:  ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend/out/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**

  # ────────────────────────────────────────────────────────
  # JOB 2 — Deploy do Laravel via SSH
  # ────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Laravel)
    runs-on: ubuntu-latest

    steps:
      - name: Atualizar Laravel no servidor via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port:     22
          script: |
            set -e
            cd ~/laravel

            # Puxa alterações do repositório
            git pull origin main

            # Copia arquivos do backend para ~/laravel
            rsync -av --delete dalacorte-sistema/backend/ ~/laravel/ \
              --exclude='.env' \
              --exclude='storage/logs' \
              --exclude='storage/framework/cache'

            # Atualiza dependências PHP
            composer install --no-dev --optimize-autoloader --no-interaction

            # Migrations pendentes
            php artisan migrate --force

            # Recria caches
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "✅ Deploy concluído!"
